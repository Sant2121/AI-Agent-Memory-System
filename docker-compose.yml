version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: memory_postgres
    environment:
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_password
      POSTGRES_DB: memory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memory_network

  redis:
    image: redis:7-alpine
    container_name: memory_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memory_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: memory_backend
    environment:
      DATABASE_URL: postgresql://memory_user:memory_password@postgres:5432/memory_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "True"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - memory_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: memory_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - memory_network

volumes:
  postgres_data:

networks:
  memory_network:
    driver: bridge
